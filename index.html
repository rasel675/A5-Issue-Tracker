<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center" style="background-color: #f0f2f5;">

  <div class="bg-white rounded-2xl shadow-md px-12 py-10 w-full max-w-xl">

    <div class="flex justify-center mb-5">
      <img src="github-logo.png" alt="GitHub Logo" class="w-24 h-24 object-contain" />
    </div>

    <h1 class="text-center text-3xl font-bold text-gray-900 mb-1">
      GitHub Issues Tracker
    </h1>

    <p class="text-center text-gray-500 mb-7">
      Sign in to manage your issues
    </p>

    <div class="mb-1">
      <label class="block text-gray-800 font-medium mb-2">Username</label>
      <input
        type="text"
        id="username"
        placeholder="Enter Username"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 bg-white"
      />
      <p class="text-purple-600 text-sm mt-1">Default: admin</p>
    </div>

    <div class="mt-3 mb-1">
      <label class="block text-gray-800 font-medium mb-2">Password</label>
      <input
        type="password"
        id="password"
        placeholder="Enter Password"
        class="w-full rounded-lg border border-gray-300 px-3 py-2 bg-white"
      />
      <p class="text-purple-600 text-sm mt-1">Default: admin123</p>
    </div>

    <p id="error-msg" class="text-red-500 text-sm mt-2 hidden">
      Invalid credentials. Please try again.
    </p>

    <button
      onclick="handleLogin()"
      class="w-full mt-5 text-white text-lg font-semibold rounded-lg py-2"
      style="background-color: #6d28d9; border: none;"
    >
      Sign In
    </button>

    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-gray-400 text-sm">OR</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <p class="text-center text-gray-400 text-sm mb-3">Demo Credentials:</p>

    <div class="bg-gray-100 rounded-lg py-4 text-center">
      <p class="text-gray-800 text-sm">
        <span class="font-bold">Username:</span> admin
      </p>
      <p class="text-gray-800 text-sm mt-1">
        <span class="font-bold">Password:</span> admin123
      </p>
    </div>

  </div>

  <script src="js/sign-in.js"></script>
</body>
</html>
