<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="font-['Inter'] bg-gray-100 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-4 md:px-8 py-3 flex items-center justify-between">
    <a href="dashboard.html" class="flex items-center gap-2">
  <img src="assets/github-logo.png" alt="logo" class="w-8 h-8 object-contain" />
  <span class="text-xl font-bold text-gray-900">GitHub Issues Tracker</span>
</a>
    <div class="flex items-center gap-3">
  <div class="relative">
       <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
    <i class="fa-solid fa-magnifying-glass "></i>
  </span>
     <input
  type="text"
  id="search-input"
  placeholder="Search issues..."
  oninput="handleSearch()"
  class="pl-9 pr-4 py-2 border border-purple-500 rounded-lg text-sm bg-white w-40 md:w-64 focus:outline-none focus:border-purple-500 text-black"
/>
      </div>
      <button class="btn bg-[#4A00FF] text-white text-sm font-semibold rounded-lg px-4 border-none">
        + New Issue
      </button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 md:px-6 py-6 md:py-8">

    <div class="flex gap-2 mb-6">
      <button
        id="tab-all"
        onclick="setTab('all')"
        class="tab-btn px-6 py-2 rounded-lg text-sm font-semibold border transition-all bg-[#4A00FF] text-white border-[#4A00FF]"
        data-active="bg-[#4A00FF] text-white border-[#4A00FF]"
        data-inactive="bg-white text-gray-700 border-gray-300">
        All
      </button>
      <button
        id="tab-open"
        onclick="setTab('open')"
        class="tab-btn px-6 py-2 rounded-lg text-sm font-semibold border transition-all bg-white text-gray-700 border-gray-300"
        data-active="bg-[#4A00FF] text-white border-[#4A00FF]"
        data-inactive="bg-white text-gray-700 border-gray-300">
        Open
      </button>
      <button
        id="tab-closed"
        onclick="setTab('closed')"
        class="tab-btn px-6 py-2 rounded-lg text-sm font-semibold border transition-all bg-white text-gray-700 border-gray-300"
        data-active="bg-[#4A00FF] text-white border-[#4A00FF]"
        data-inactive="bg-white text-gray-700 border-gray-300">
        Closed
      </button>
    </div>
   <div class="bg-white rounded-xl border border-gray-200 px-4 md:px-6 py-4 mb-6 flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <img src="assets/Aperture.png" alt="icon" class="w-9 h-9" />
      <div>
       <p id="issue-count-title" class="text-lg font-bold text-gray-900">0 Issues</p>
       <p class="text-sm text-gray-500">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center gap-5">
        <div class="flex items-center gap-2 text-sm text-gray-700">
          <i class="fa-solid fa-circle text-green-500 text-xs"></i> Open
        </div>
      <div class="flex items-center gap-2 text-sm text-gray-700">
          <i class="fa-solid fa-circle text-purple-500 text-xs"></i> Closed
      </div>
      </div>
    </div>


    <div id="spinner" class="flex justify-center items-center py-20">
      <span class="loading loading-spinner loading-lg text-purple-600"></span>
    </div>

    <div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 hidden"></div>

  </main>

  <dialog id="issue-modal" class="modal">
    <div class="modal-box max-w-2xl rounded-2xl p-6 bg-white">
      <h3 id="modal-title" class="text-xl font-bold text-gray-900 mb-2"></h3>
      <div class="flex items-center gap-2 mb-4">
        <span
          id="modal-status-badge"
          class="px-3 py-1 rounded-full text-white text-xs font-semibold"
          data-open="bg-green-500"
          data-closed="bg-purple-500">
        </span>
     <span class="text-gray-400 text-xs">•</span>
        <span id="modal-meta" class="text-gray-500 text-xs"></span>
      </div>
      <div id="modal-labels" class="flex flex-wrap gap-2 mb-4"></div>
      <p id="modal-desc" class="text-sm text-gray-700 leading-relaxed mb-5"></p>
      <div class="bg-gray-50 rounded-xl p-4 grid grid-cols-2 gap-4 mb-5">
        <div>
      <p class="text-sm text-gray-500 mb-1">Assignee:</p>
          <p id="modal-assignee" class="text-sm font-bold text-gray-900"></p>
        </div>
        <div>
          <p class="text-sm text-gray-500 mb-1">Priority:</p>
          <p id="modal-priority"></p>
        </div>
      </div>
      <div class="flex justify-end">
        <form method="dialog">
          <button class="btn bg-[#4A00FF] text-white font-semibold rounded-lg px-6 border-none">
            Close
          </button>
        </form>
    </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>



  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script> 

</body>
</html>
